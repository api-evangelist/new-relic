          type: object
          value: $.
        inputParameters:
        - name: policy_id
          in: path
          type: integer
          description: Alerts policy failure condition
          required: true
        - name: location_failure_condition
          in: path
          type: integer
          description: Alerts policy ID
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: alerts_nrql_conditions-policies-policy_id}.json
