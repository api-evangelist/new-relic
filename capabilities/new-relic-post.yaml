          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Key
      value: '{{env.NEW_RELIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: new-relic-post-rest
    port: 8080
    description: REST adapter for New Relic — Post. One Spectral-compliant resource per consumed operation, prefixed with
