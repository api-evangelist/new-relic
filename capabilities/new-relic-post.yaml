naftiko: 1.0.0-alpha2
info:
  label: New Relic — Post
  description: 'New Relic — Post. 8 operations. Lead operation: New Relic Post Alerts Channels. Self-contained Naftiko capability
    covering one New Relic business surface.'
  tags:
  - New Relic
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
