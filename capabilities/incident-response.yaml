naftiko: "1.0.0-alpha1"

info:
  label: "New Relic Incident Response"
  description: "Incident response workflow combining alerts, incidents, violations, and events for SREs investigating and resolving production issues detected by New Relic."
  tags:
    - New Relic
    - Incident Response
    - SRE
    - Alerts
    - Incidents
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      NEW_RELIC_API_KEY: NEW_RELIC_API_KEY

capability:
  consumes:
    - import: rest-api
      location: ./shared/rest-api.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: incident-response-api
      description: "Unified REST API for New Relic incident response workflows."
      resources:
        - path: /v1/incidents
          name: incidents
          description: "List alert incidents"
          operations:
            - method: GET
              name: get-alerts-incidents
              description: "List alert incidents"
              call: "rest-api.get-alerts-incidents"
              with:
                only_open: "rest.only_open"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/violations
          name: violations
          description: "List alert violations"
          operations:
            - method: GET
              name: get-alerts-violations
              description: "List alert violations"
              call: "rest-api.get-alerts-violations"
              with:
                only_open: "rest.only_open"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alert-events
          name: alert-events
          description: "List alert events"
          operations:
            - method: GET
              name: get-alerts-events
              description: "List alert events"
              call: "rest-api.get-alerts-events"
              with:
                filter[product]: "rest.filter_product"
                filter[entity_type]: "rest.filter_entity_type"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/alert-conditions
          name: alert-conditions
          description: "List alert conditions"
          operations:
            - method: GET
              name: get-alerts-conditions
              description: "List alert conditions for a policy"
              call: "rest-api.get-alerts-conditions"
              with:
                policy_id: "rest.policy_id"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications
          name: applications
          description: "List applications for context"
          operations:
            - method: GET
              name: get-applications
              description: "List applications"
              call: "rest-api.get-applications"
              with:
                filter[name]: "rest.filter_name"
                page: "rest.page"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/applications/{id}
          name: application-detail
          description: "Get application details for incident context"
          operations:
            - method: GET
              name: get-application
              description: "Get application details"
              call: "rest-api.get-application"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: incident-response-mcp
      transport: http
      description: "MCP server for AI-assisted New Relic incident response."
      tools:
        - name: get-alerts-incidents
          description: "List alert incidents, optionally filtered to only open ones"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-alerts-incidents"
          with:
            only_open: "tools.only_open"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alerts-violations
          description: "List alert violations, optionally filtered to only open ones"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-alerts-violations"
          with:
            only_open: "tools.only_open"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alerts-events
          description: "List alert events filtered by product or entity type"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-alerts-events"
          with:
            filter[product]: "tools.filter_product"
            filter[entity_type]: "tools.filter_entity_type"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-alerts-conditions
          description: "List alert conditions for a specific policy"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-alerts-conditions"
          with:
            policy_id: "tools.policy_id"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-applications
          description: "List applications for incident context"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-applications"
          with:
            filter[name]: "tools.filter_name"
            page: "tools.page"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-application
          description: "Get application details for incident investigation"
          hints:
            readOnly: true
            openWorld: true
          call: "rest-api.get-application"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
