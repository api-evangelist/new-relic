naftiko: 1.0.0-alpha2
info:
  label: New Relic Alerting Configuration
  description: Alert policy and condition management workflow for platform admins configuring and maintaining New Relic alerting
    rules, notification channels, and policy structures.
  tags:
  - New Relic
  - Alerting
  - Configuration
  - Platform Administration
  - Policies
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    NEW_RELIC_API_KEY: NEW_RELIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-api
    baseUri: https://api.newrelic.com/v2
    description: New Relic REST API v2 for managing applications, alerts, and retrieving monitoring data.
    authentication:
      type: apikey
      key: Api-Key
      value: '{{NEW_RELIC_API_KEY}}'
      placement: header
    resources:
    - name: applications
      path: /applications.json
      description: Manage monitored applications
      operations:
      - name: get-applications
        method: GET
        description: Retrieves a paginated list of all applications.
        inputParameters:
        - name: filter[name]
          in: query
          type: string
          required: false
          description: Filter by application name.
        - name: filter[host]
          in: query
          type: string
          required: false
          description: Filter by application host.
        - name: filter[ids]
          in: query
          type: array
          required: false
          description: Filter by application IDs.
        - name: filter[language]
          in: query
          type: string
          required: false
          description: Filter by application language.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-detail
      path: /applications/{id}.json
      description: Get, update, or delete a specific application
      operations:
      - name: get-application
        method: GET
        description: Retrieves a specific application by ID.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: update-application
        method: PUT
        description: Updates an application's settings.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            application: '{{tools.application}}'
      - name: delete-application
        method: DELETE
        description: Removes an application from New Relic.
        inputParameters:
        - name: id
          in: path
          type: integer
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-deployments
      path: /applications/{application_id}/deployments.json
      description: Manage application deployments
      operations:
      - name: get-deployments
        method: GET
        description: Retrieves deployment records for an application.
        inputParameters:
        - name: application_id
          in: path
          type: integer
          required: true
          description: Application ID.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-deployment
        method: POST
        description: Records a new deployment for an application.
        inputParameters:
        - name: application_id
          in: path
          type: integer
          required: true
          description: Application ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            deployment: '{{tools.deployment}}'
    - name: application-hosts
      path: /applications/{application_id}/hosts.json
      description: List application hosts
      operations:
      - name: get-application-hosts
        method: GET
        description: Retrieves a list of hosts for an application.
        inputParameters:
        - name: application_id
          in: path
          type: integer
          required: true
          description: Application ID.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-metrics
      path: /applications/{application_id}/metrics.json
      description: List application metrics
      operations:
      - name: get-application-metrics
        method: GET
        description: Retrieves available metric names for an application.
        inputParameters:
        - name: application_id
          in: path
          type: integer
          required: true
          description: Application ID.
        - name: name
          in: query
          type: string
          required: false
          description: Filter by metric name.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: application-metrics-data
      path: /applications/{application_id}/metrics/data.json
      description: Query application metric data
      operations:
      - name: get-application-metrics-data
        method: GET
        description: Retrieves metric data for an application.
        inputParameters:
        - name: application_id
          in: path
          type: integer
          required: true
          description: Application ID.
        - name: names[]
          in: query
          type: array
          required: true
          description: Metric names to retrieve.
        - name: from
          in: query
          type: string
          required: false
          description: Start of the time range.
        - name: to
          in: query
          type: string
          required: false
          description: End of the time range.
        - name: period
          in: query
          type: integer
          required: false
          description: Period in seconds for data point aggregation.
        - name: summarize
          in: query
          type: boolean
          required: false
          description: Whether to return a single summarized data point.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: key-transactions
      path: /key_transactions.json
      description: List key transactions
      operations:
      - name: get-key-transactions
        method: GET
        description: Retrieves a list of key transactions.
        inputParameters:
        - name: filter[name]
          in: query
          type: string
          required: false
          description: Filter by key transaction name.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-policies
      path: /alerts_policies.json
      description: Manage alert policies
      operations:
      - name: get-alerts-policies
        method: GET
        description: Retrieves a list of alert policies.
        inputParameters:
        - name: filter[name]
          in: query
          type: string
          required: false
          description: Filter by policy name.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: create-alerts-policy
        method: POST
        description: Creates a new alert policy.
        inputParameters: []
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            policy: '{{tools.policy}}'
    - name: alerts-policy-detail
      path: /alerts_policies/{policy_id}.json
      description: Update or delete an alert policy
      operations:
      - name: update-alerts-policy
        method: PUT
        description: Updates an alert policy.
        inputParameters:
        - name: policy_id
          in: path
          type: integer
          required: true
          description: Policy ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        body:
          type: json
          data:
            policy: '{{tools.policy}}'
      - name: delete-alerts-policy
        method: DELETE
        description: Deletes an alert policy.
        inputParameters:
        - name: policy_id
          in: path
          type: integer
          required: true
          description: Policy ID.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-conditions
      path: /alerts_conditions.json
      description: List alert conditions
      operations:
      - name: get-alerts-conditions
        method: GET
        description: Retrieves a list of alert conditions.
        inputParameters:
        - name: policy_id
          in: query
          type: integer
          required: true
          description: Policy ID to filter conditions.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-incidents
      path: /alerts_incidents.json
      description: List alert incidents
      operations:
      - name: get-alerts-incidents
        method: GET
        description: Retrieves a list of alert incidents.
        inputParameters:
        - name: only_open
          in: query
          type: boolean
          required: false
          description: Filter for only open incidents.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-violations
      path: /alerts_violations.json
      description: List alert violations
      operations:
      - name: get-alerts-violations
        method: GET
        description: Retrieves a list of alert violations.
        inputParameters:
        - name: only_open
          in: query
          type: boolean
          required: false
          description: Filter for only open violations.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: alerts-events
      path: /alerts_events.json
      description: List alert events
      operations:
      - name: get-alerts-events
        method: GET
        description: Retrieves a list of alert events.
        inputParameters:
        - name: filter[product]
          in: query
          type: string
          required: false
          description: Filter by product type.
        - name: filter[entity_type]
          in: query
          type: string
          required: false
          description: Filter by entity type.
        - name: page
          in: query
          type: integer
          required: false
          description: Pagination index.
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8083
    namespace: alerting-config-api
    description: Unified REST API for New Relic alert policy and condition management.
    resources:
    - path: /v1/policies
      name: policies
      description: Manage alert policies
      operations:
      - method: GET
        name: get-alerts-policies
        description: List alert policies
        call: rest-api.get-alerts-policies
        with:
          filter[name]: rest.filter_name
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: create-alerts-policy
        description: Create a new alert policy
        call: rest-api.create-alerts-policy
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/policies/{policyId}
      name: policy-detail
      description: Update or delete an alert policy
      operations:
      - method: PUT
        name: update-alerts-policy
        description: Update an alert policy
        call: rest-api.update-alerts-policy
        with:
          policy_id: rest.policyId
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: delete-alerts-policy
        description: Delete an alert policy
        call: rest-api.delete-alerts-policy
        with:
          policy_id: rest.policyId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conditions
      name: conditions
      description: List alert conditions
      operations:
      - method: GET
        name: get-alerts-conditions
        description: List conditions for a policy
        call: rest-api.get-alerts-conditions
        with:
          policy_id: rest.policy_id
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/incidents
      name: incidents
      description: List alert incidents
      operations:
      - method: GET
        name: get-alerts-incidents
        description: List alert incidents
        call: rest-api.get-alerts-incidents
        with:
          only_open: rest.only_open
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/violations
      name: violations
      description: List alert violations
      operations:
      - method: GET
        name: get-alerts-violations
        description: List alert violations
        call: rest-api.get-alerts-violations
        with:
          only_open: rest.only_open
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/alert-events
      name: alert-events
      description: List alert events
      operations:
      - method: GET
        name: get-alerts-events
        description: List alert events
        call: rest-api.get-alerts-events
        with:
          filter[product]: rest.filter_product
          filter[entity_type]: rest.filter_entity_type
          page: rest.page
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9093
    namespace: alerting-config-mcp
    transport: http
    description: MCP server for AI-assisted New Relic alert policy and condition management.
    tools:
    - name: get-alerts-policies
      description: List all alert policies
      hints:
        readOnly: true
        openWorld: true
      call: rest-api.get-alerts-policies
      with:
        filter[name]: tools.filter_name
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: create-alerts-policy
      description: Create a new alert policy
      hints:
        readOnly: false
        openWorld: true
      call: rest-api.create-alerts-policy
      outputParameters:
      - type: object
        mapping: $.
    - name: update-alerts-policy
      description: Update an alert policy
      hints:
        readOnly: false
        idempotent: true
        openWorld: true
      call: rest-api.update-alerts-policy
      with:
        policy_id: tools.policy_id
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-alerts-policy
      description: Delete an alert policy
      hints:
        readOnly: false
        destructive: true
        idempotent: true
        openWorld: true
      call: rest-api.delete-alerts-policy
      with:
        policy_id: tools.policy_id
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alerts-conditions
      description: List alert conditions for a specific policy
      hints:
        readOnly: true
        openWorld: true
      call: rest-api.get-alerts-conditions
      with:
        policy_id: tools.policy_id
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alerts-incidents
      description: List alert incidents
      hints:
        readOnly: true
        openWorld: true
      call: rest-api.get-alerts-incidents
      with:
        only_open: tools.only_open
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alerts-violations
      description: List alert violations
      hints:
        readOnly: true
        openWorld: true
      call: rest-api.get-alerts-violations
      with:
        only_open: tools.only_open
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
    - name: get-alerts-events
      description: List alert events filtered by product or entity type
      hints:
        readOnly: true
        openWorld: true
      call: rest-api.get-alerts-events
      with:
        filter[product]: tools.filter_product
        filter[entity_type]: tools.filter_entity_type
        page: tools.page
      outputParameters:
      - type: object
        mapping: $.
