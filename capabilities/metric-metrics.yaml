naftiko: 1.0.0-alpha2
info:
  label: New Relic Metric API — Metrics
  description: 'New Relic Metric API — Metrics. 1 operations. Lead operation: New Relic Send Metric Data. Self-contained Naftiko
    capability covering one New Relic business surface.'
  tags:
  - New Relic
  - Metrics
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NEW_RELIC_API_KEY: NEW_RELIC_API_KEY
capability:
  consumes:
  - type: http
    namespace: metric-metrics
    baseUri: https://metric-api.newrelic.com
    description: New Relic Metric API — Metrics business capability. Self-contained, no shared references.
    resources:
    - name: metric-v1
      path: /metric/v1
      operations:
      - name: sendmetrics
        method: POST
        description: New Relic Send Metric Data
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: Content-Encoding
          in: header
          type: string
          description: Compression encoding. Use gzip for compressed payloads.
        - name: Content-Type
          in: header
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Api-Key
      value: '{{env.NEW_RELIC_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: metric-metrics-rest
    port: 8080
    description: REST adapter for New Relic Metric API — Metrics. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/metric/v1
      name: metric-v1
      description: REST surface for metric-v1.
      operations:
      - method: POST
        name: sendmetrics
        description: New Relic Send Metric Data
        call: metric-metrics.sendmetrics
        with:
          Content-Encoding: rest.Content-Encoding
          Content-Type: rest.Content-Type
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: metric-metrics-mcp
    port: 9090
    transport: http
    description: MCP adapter for New Relic Metric API — Metrics. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: new-relic-send-metric-data
      description: New Relic Send Metric Data
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: metric-metrics.sendmetrics
      with:
        Content-Encoding: tools.Content-Encoding
        Content-Type: tools.Content-Type
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
