naftiko: "1.0.0-alpha1"

info:
  label: "New Relic Trace API"
  description: "The New Relic Trace API allows distributed tracing data to be sent directly to New Relic in either New Relic format or Zipkin JSON v2 format."
  tags:
    - New Relic
    - Traces
    - Distributed Tracing
    - Telemetry
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      NEW_RELIC_INSERT_KEY: NEW_RELIC_INSERT_KEY

capability:
  consumes:
    - type: http
      namespace: trace-api
      baseUri: https://trace-api.newrelic.com
      description: "New Relic Trace API for ingesting distributed trace spans."
      authentication:
        type: apikey
        key: Api-Key
        value: "{{NEW_RELIC_INSERT_KEY}}"
        placement: header
      resources:
        - name: traces
          path: /trace/v1
          description: "Send trace spans"
          operations:
            - name: send-traces
              method: POST
              description: "Sends distributed trace spans to New Relic."
              inputParameters:
                - name: Data-Format
                  in: header
                  type: string
                  required: true
                  description: "The format of the trace data (newrelic or zipkin)."
                - name: Data-Format-Version
                  in: header
                  type: string
                  required: false
                  description: "Version of the data format."
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: "{{tools.trace_data}}"

  exposes:
    - type: rest
      port: 8104
      namespace: trace-api-expose
      resources:
        - path: /v1/traces
          name: traces
          description: "Send trace spans"
          operations:
            - method: POST
              name: send-traces
              description: "Send trace spans to New Relic"
              call: "trace-api.send-traces"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9104
      namespace: trace-api-mcp
      transport: http
      tools:
        - name: send-traces
          description: "Send distributed trace spans to New Relic"
          hints:
            readOnly: false
            openWorld: true
          call: "trace-api.send-traces"
          with:
            trace_data: "tools.trace_data"
          outputParameters:
            - type: object
              mapping: "$."
