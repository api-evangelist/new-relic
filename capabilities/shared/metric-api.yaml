naftiko: "1.0.0-alpha1"

info:
  label: "New Relic Metric API"
  description: "The New Relic Metric API is an HTTP endpoint for ingesting dimensional metric data directly into the New Relic platform. Supports gauge, count, and summary metric types."
  tags:
    - New Relic
    - Metrics
    - Metric Ingestion
    - Telemetry
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      NEW_RELIC_INSERT_KEY: NEW_RELIC_INSERT_KEY

capability:
  consumes:
    - type: http
      namespace: metric-api
      baseUri: https://metric-api.newrelic.com
      description: "New Relic Metric API for ingesting dimensional metric data."
      authentication:
        type: apikey
        key: Api-Key
        value: "{{NEW_RELIC_INSERT_KEY}}"
        placement: header
      resources:
        - name: metrics
          path: /metric/v1
          description: "Send metric data"
          operations:
            - name: send-metrics
              method: POST
              description: "Sends metric data points to New Relic."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: "{{tools.metric_data}}"

  exposes:
    - type: rest
      port: 8103
      namespace: metric-api-expose
      resources:
        - path: /v1/metrics
          name: metrics
          description: "Send metric data"
          operations:
            - method: POST
              name: send-metrics
              description: "Send metric data to New Relic"
              call: "metric-api.send-metrics"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9103
      namespace: metric-api-mcp
      transport: http
      tools:
        - name: send-metrics
          description: "Send dimensional metric data to New Relic"
          hints:
            readOnly: false
            openWorld: true
          call: "metric-api.send-metrics"
          with:
            metric_data: "tools.metric_data"
          outputParameters:
            - type: object
              mapping: "$."
