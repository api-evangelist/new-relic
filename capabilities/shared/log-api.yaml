naftiko: "1.0.0-alpha1"

info:
  label: "New Relic Log API"
  description: "The New Relic Log API enables log data to be sent directly to the New Relic platform via HTTP POST requests for querying in the Logs UI and via NRQL."
  tags:
    - New Relic
    - Logs
    - Log Ingestion
    - Observability
  created: "2026-04-18"
  modified: "2026-04-18"

binds:
  - namespace: env
    keys:
      NEW_RELIC_INSERT_KEY: NEW_RELIC_INSERT_KEY

capability:
  consumes:
    - type: http
      namespace: log-api
      baseUri: https://log-api.newrelic.com
      description: "New Relic Log API for ingesting log data."
      authentication:
        type: apikey
        key: Api-Key
        value: "{{NEW_RELIC_INSERT_KEY}}"
        placement: header
      resources:
        - name: logs
          path: /log/v1
          description: "Send log data"
          operations:
            - name: send-logs
              method: POST
              description: "Sends one or more log records to New Relic."
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data: "{{tools.log_data}}"

  exposes:
    - type: rest
      port: 8102
      namespace: log-api-expose
      resources:
        - path: /v1/logs
          name: logs
          description: "Send log data"
          operations:
            - method: POST
              name: send-logs
              description: "Send log data to New Relic"
              call: "log-api.send-logs"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9102
      namespace: log-api-mcp
      transport: http
      tools:
        - name: send-logs
          description: "Send log records to New Relic"
          hints:
            readOnly: false
            openWorld: true
          call: "log-api.send-logs"
          with:
            log_data: "tools.log_data"
          outputParameters:
            - type: object
              mapping: "$."
