openapi: 3.1.0
info:
  title: New Relic Event Alerts Put API
  description: The New Relic Event API allows you to send custom event data to the New Relic platform via HTTP POST. Custom events submitted through this API can be queried and visualized using NRQL, making it suitable for tracking arbitrary business or application events. Each event is a JSON object with an eventType and any number of additional attribute key-value pairs.
  version: '1'
  contact:
    name: New Relic Support
    url: https://support.newrelic.com/
  termsOfService: https://newrelic.com/termsandconditions/terms
  x-last-validated: '2026-04-18'
servers:
- url: https://insights-collector.newrelic.com
  description: US Production
- url: https://insights-collector.eu01.nr-data.net
  description: EU Production
security:
- apiKey: []
tags:
- name: Put
paths:
  /applications/{id}.json:
    put:
      tags:
      - Put
      summary: New Relic Put Applications
      description: '<p>This API endpoint allows you to update certain parameters of your application.</p>


        <p>The input is expected to be in <strong>JSON or XML</strong> format in the body parameter of the PUT request. The exact

        schema is defined below. Any extra parameters passed in the body <strong>will be ignored</strong>.</p>


        <p>See our documentation for a discussion and simple example of

        <a href="https://docs.newrelic.com/docs/apis/rest-api-v2/application-examples-v2/changing-alias-your-application-v2" target="_blank"> updating</a>

        an application.</p>


        '
      parameters:
      - name: id
        in: path
        description: Application ID
        required: true
        schema:
          type: integer
        example: 100
      requestBody:
        description: Application schema
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Application'
            examples:
              PutapplicationsidRequestExample:
                summary: Default putApplicationsId request
                x-microcks-default: true
                value:
                  application:
                    name: Example Title
          application/xml:
            schema:
              $ref: '#/components/schemas/Application'
            examples:
              PutapplicationsidRequestExample:
                summary: Default putApplicationsId request
                x-microcks-default: true
                value:
                  application:
                    name: Example Title
        required: true
      responses:
        '200':
          description: No response was specified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                Putapplicationsid200Example:
                  summary: Default putApplicationsId 200 response
                  x-microcks-default: true
                  value:
                    application:
                      application_summary: {}
                      end_user_summary: {}
                      health_status: {}
                      id: {}
                      language: {}
                      last_reported_at: {}
                      links: {}
                      name: {}
                      reporting: {}
                      settings: {}
            application/xml:
              schema:
                $ref: '#/components/schemas/ApplicationResponse'
              examples:
                Putapplicationsid200Example:
                  summary: Default putApplicationsId 200 response
                  x-microcks-default: true
                  value:
                    application:
                      application_summary: {}
                      end_user_summary: {}
                      health_status: {}
                      id: {}
                      language: {}
                      last_reported_at: {}
                      links: {}
                      name: {}
                      reporting: {}
                      settings: {}
      x-codegen-request-body-name: application
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        CaselCaseOperationIds: true
        GenerateOperationSummariesFromPath: true
        ChooseTags: true
      operationId: putApplicationsId
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /alerts_conditions/{condition_id}.json:
    put:
      tags:
      - Put
      summary: New Relic Put Alerts Conditions
