components:
  schemas:
    MetricParserResponseType:
      type: object
      properties:
        name:
          type: string
          example: example-resource-01
        values:
          type: array
          items:
            type: string
          example:
          - example_string
    MetricListResponse:
      type: object
      properties:
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricParserResponseType'
          example:
          - name: example-resource-01
            values:
            - {}
    MetricPayload:
      type: array
      description: An array of metric data objects to be ingested
      items:
        $ref: '#/components/schemas/MetricDataObject'
    TimesliceResponse:
      type: object
      properties:
        from:
          type: string
          format: date-time
          example: '2026-04-18T14:30:00Z'
        to:
          type: string
          format: date-time
          example: '2026-04-18T14:30:00Z'
        values:
          type: object
          properties: {}
          example: {}
    MetricDataResponseType:
      type: object
      properties:
        from:
          type: string
          format: date-time
          example: '2026-04-18T14:30:00Z'
        metrics:
          type: array
          items:
            $ref: '#/components/schemas/MetricResponse'
          example:
          - name: example-resource-01
            timeslices:
            - {}
        metrics_found:
          type: string
          example: example_string
        metrics_not_found:
          type: string
          example: example_string
        to:
          type: string
          format: date-time
          example: '2026-04-18T14:30:00Z'
    SummaryValue:
      type: object
      description: Summary metric value containing statistical aggregations
      required:
      - count
      - sum
      - min
      - max
      properties:
        count:
          type: number
          description: The number of measurements in this summary
          example: 42.5
        sum:
          type: number
          description: The sum of all measurement values
          example: 42.5
        min:
          type: number
          description: The minimum measurement value
          example: 42.5
        max:
          type: number
          description: The maximum measurement value
          example: 42.5
    CommonBlock:
      type: object
      description: Shared attributes applied to all metrics in this data object unless overridden at the metric level
      properties:
        timestamp:
          type: integer
          description: Unix timestamp in milliseconds for all metrics in this batch
          example: 1718153645993
        interval.ms:
          type: integer
          description: Default measurement interval in milliseconds for count and summary metrics
          example: 100
        attributes:
          type: object
          description: Key-value pairs applied to all metrics in the batch. Values can be strings, numbers, or booleans.
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
          example:
            customAttribute: example_value
    MetricResponse:
      type: object
      properties:
        name:
          type: string
          example: example-resource-01
        timeslices:
          type: array
          items:
            $ref: '#/components/schemas/TimesliceResponse'
          example:
          - from: '2026-04-18T14:30:00Z'
            to: '2026-04-18T14:30:00Z'
            values: {}
    MetricDataPoint:
      type: object
      description: A single metric data point
      required:
      - name
      - type
      - value
      properties:
        name:
          type: string
          description: The metric name (e.g., cpu.usage.percent)
          maxLength: 255
          example: example-resource-01
        type:
          type: string
          description: The metric type
          enum:
          - gauge
          - count
          - summary
          example: gauge
        value:
          description: The metric value. For gauge and count, a number. For summary, an object with count, sum, min, and max fields.
          oneOf:
          - type: number
          - $ref: '#/components/schemas/SummaryValue'
          example: 42.5
        timestamp:
          type: integer
          description: Unix timestamp in milliseconds. Overrides the common timestamp for this metric.
          example: 1718153645993
        interval.ms:
          type: integer
          description: Measurement interval in milliseconds. Required for count and summary types.
          example: 100
        attributes:
          type: object
          description: Additional key-value attributes for this metric point
          additionalProperties:
            oneOf:
            - type: string
            - type: number
            - type: boolean
          example:
            customAttribute: example_value
    ErrorResponse:
      type: object
      description: Error response body
      properties:
        error:
          type: object
          properties:
            type:
              type: string
              description: Error type identifier
            message:
              type: string
              description: Human-readable error description
          example:
            type: standard
            message: Operation completed successfully
        failures:
          type: array
          description: List of individual failure details when partial rejection occurs
          items:
            type: object
            properties:
              error:
                type: object
                properties:
                  message:
                    type: string
              failed:
                type: array
                items:
                  type: object
          example:
          - error:
              message: Operation completed successfully
            failed:
            - {}
    MetricParserResponse:
      type: object
      properties:
        metric:
          $ref: '#/components/schemas/MetricParserResponseType'
    MetricDataObject:
      type: object
      description: A container for a batch of metrics with optional shared attributes
      properties:
        common:
          $ref: '#/components/schemas/CommonBlock'
        metrics:
          type: array
          description: Array of individual metric data points
          items:
            $ref: '#/components/schemas/MetricDataPoint'
          example:
          - name: example-resource-01
            type: gauge
            value: 42.5
            timestamp: 1718153645993
            interval.ms: 100
            attributes:
              customAttribute: example_value
      required:
      - metrics
    AcceptedResponse:
      type: object
      description: Response returned when the payload was accepted
      properties:
        requestId:
          type: string
          description: Unique identifier for the accepted request
          example: '500123'
    MetricDataResponse:
      type: object
      properties:
        metric_data:
          $ref: '#/components/schemas/MetricDataResponseType'
  parameters:
    ApiKey:
      name: Api-Key
      in: header
      required: true
      description: New Relic License Key or Ingest API Key with Insert permissions
      schema:
        type: string
  securitySchemes:
    apiKey:
      type: apiKey
      in: header
      name: Api-Key
      description: New Relic License Key or Ingest API Key
externalDocs:
  description: New Relic Event API Documentation
  url: https://docs.newrelic.com/docs/data-apis/ingest-apis/event-api/introduction-event-api/
