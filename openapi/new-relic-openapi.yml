              schema:
                $ref: '#/components/schemas/MetricParserResponse'
            application/xml:
              schema:
                $ref: '#/components/schemas/MetricParserResponse'
      x-api-evangelist-processing:
        PascalCaseOperationSummaries: true
        CaselCaseOperationIds: true
        GenerateOperationSummariesFromPath: true
        ChooseTags: true
      operationId: getApplicationsIdInstancesInstanceIdMetrics
  /applications/{application_id}/instances/{instance_id}/metrics/data.json:
    get:
      tags:
        - Get
        - Applications
        - Identifiers
        - Instances
        - Instance
        - Metrics
        - Data
      summary: Get  Applications Instances Instance Metrics Data
      description: >+
        <p>This API endpoint returns a list of values for each of the requested
        metrics. The list of available metrics

        can be returned using the Metric Name API endpoint.</p>


        <p>Metric data can be filtered by a number of parameters, including
        multiple names and values, and by time range.

        Metric names and values will be matched intelligently in the
        background.</p>


        <p>You can also retrieve a summarized data point across the entire time
        range selected by using the summarize

        parameter.</p>


        <p>See our documentation for a discussion on <a
        href="https://docs.newrelic.com/docs/apis/rest-api-v2/requirements/pagination-api-output"
        target="_blank">

        output pagination</a>, <a
        href="https://docs.newrelic.com/docs/apis/rest-api-v2/requirements/extracting-metric-data"
        target="_blank"> time range</a>

        related considerations, and for examples of <a
        href="https://docs.newrelic.com/docs/apis/rest-api-v2/requirements/new-relic-rest-api-v2-getting-started#examples"
        target="_blank">requesting and using metric values</a>.</p>

      parameters:
        - name: application_id
          in: path
          description: Application ID
          required: true
          schema:
            type: integer
        - name: instance_id
          in: path
          description: Application Instance ID
          required: true
