  - aid: new-relic:new-relic-event-api
    name: New Relic Event API
    description: The New Relic Event API allows you to send custom event data to the New Relic platform
      via HTTP POST. Custom events submitted through this API can be queried and visualized using NRQL,
      making it suitable for tracking arbitrary business or application events.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
    humanURL: https://docs.newrelic.com/docs/data-apis/ingest-apis/event-api/introduction-event-api/
