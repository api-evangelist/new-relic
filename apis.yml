  tags:
  - Alerts
  - Monitoring
  - Notifications
  - REST
- aid: new-relic:new-relic-synthetics-api
  name: New Relic Synthetics API
  description: >-
    The New Relic Synthetics API, available through NerdGraph, allows you to
    programmatically create, update, delete, and query synthetic monitors including
    ping monitors, scripted API monitors, browser monitors, and broken links monitors.
    A legacy REST-based Synthetics API is also available but NerdGraph is the recommended approach.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/synthetics/synthetic-monitoring/administration/synthetics-api/
