  - Telemetry
  - Ingest
- aid: new-relic:new-relic-control
  name: New Relic Control
  description: >-
    New Relic Control is an observability control plane that unifies Fleet Control,
    Agent Control, and Pipeline Control into a single management layer. It enables
    DevOps and platform teams to remotely deploy, configure, update, and monitor
    New Relic agents and OpenTelemetry collectors across Kubernetes clusters and
    hosts without manual per-host intervention. Fleet Control manages agent lifecycles
    at scale via a remote configuration API.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/new-relic-control/getting-started/
  baseURL: https://api.newrelic.com
  properties:
  - type: Documentation
    url: https://docs.newrelic.com/docs/new-relic-control/getting-started/
  - type: Reference
    url: https://docs.newrelic.com/docs/new-relic-control/fleet-control/overview/
  - type: Getting Started
    url: https://docs.newrelic.com/docs/new-relic-control/getting-started/
  tags:
  - Agent Management
  - Fleet Control
  - Observability
  - Automation
  - Platform
- aid: new-relic:new-relic-nrql-lookups-api
  name: New Relic NRQL Lookups API
  description: >-
    The New Relic NRQL Lookups API is a REST API for managing lookup tables that
    can be used to enrich NRQL query results. It supports creating, updating,
    downloading, listing, and deleting lookup tables in both CSV and JSON formats,
    enabling automated lookup table maintenance for data enrichment workflows.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/apis/lookups-service-api/lookups-service-api/
