      - Monitoring
      - Observability
      - Platform
  - aid: new-relic:new-relic-metric-api
    name: New Relic Metric API
    description: The New Relic Metric API is an HTTP endpoint for ingesting dimensional metric data directly
      into the New Relic platform. It accepts JSON payloads via POST requests and is the underlying API
      used by Telemetry SDKs and open source exporters such as Prometheus and DropWizard.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
