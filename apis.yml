  - Account Management
  - Platform
- aid: new-relic:new-relic-telemetry-sdk
  name: New Relic Telemetry SDKs
  description: >-
    The New Relic Telemetry SDKs are open source client libraries for sending
    metrics, events, logs, and traces (MELT) to New Relic using the ingest APIs.
    SDKs are available for Java, Python, Node.js, Go, .NET, and C, and are
    released under the Apache 2.0 license on GitHub.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/data-apis/ingest-apis/telemetry-sdks-report-custom-telemetry-data/
