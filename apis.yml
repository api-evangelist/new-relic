  - aid: new-relic:new-relic-control
    name: New Relic Control
    description: New Relic Control is an observability control plane that unifies Fleet Control, Agent
      Control, and Pipeline Control into a single management layer. It enables DevOps and platform teams
      to remotely deploy, configure, update, and monitor New Relic agents and OpenTelemetry collectors
      across Kubernetes clusters and hosts without manual per-host intervention. Fleet Control manages
      agent lifecycles at scale via a remote configuration API.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
    humanURL: https://docs.newrelic.com/docs/new-relic-control/getting-started/
