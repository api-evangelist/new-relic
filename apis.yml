  - aid: new-relic:new-relic-nerdgraph-api
    name: New Relic NerdGraph API
    description: NerdGraph is New Relic's primary GraphQL API for querying observability data, managing
      account configuration, and accessing the full breadth of New Relic platform capabilities. It is
      the recommended API for new integrations, replacing the older REST API v2 for most use cases.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
