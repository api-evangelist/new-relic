  - aid: new-relic:new-relic-trace-api
    name: New Relic Trace API
    description: The New Relic Trace API allows distributed tracing data to be sent directly to New Relic
      in either New Relic format or Zipkin JSON v2 format. It is used by Telemetry SDKs, open source integrations,
      and custom tracing implementations that need to report span data without a full APM agent.
