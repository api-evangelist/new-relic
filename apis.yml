  - Telemetry
  - Ingest
  - Custom Data
- aid: new-relic:new-relic-log-api
  name: New Relic Log API
  description: >-
    The New Relic Log API enables log data to be sent directly to the New Relic
    platform via HTTP POST requests. It accepts compressed JSON payloads and provides
    an alternative to log forwarding agents when direct integration is preferred.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/logs/log-api/introduction-log-api/
