  - aid: new-relic:new-relic-mobile-sdk
    name: New Relic Mobile SDK
    description: The New Relic Mobile SDK provides iOS and Android APIs for extending mobile monitoring
      data collection beyond what the agent captures automatically. Developers can add custom attributes,
      record custom events, track user interactions, report handled exceptions, set custom user IDs, and
      control agent behavior within iOS (Swift/Objective-C) and Android (Java/Kotlin) applications.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
