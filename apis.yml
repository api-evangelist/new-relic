apis:
- aid: new-relic:new-relic-rest-api-v2
  name: New Relic REST API v2
  description: >-
    The New Relic REST API v2 is the original HTTP REST interface for querying
    application performance data, configuring alerts, and managing account
    settings. New Relic recommends NerdGraph (GraphQL) for new integrations,
    as the REST API v2 is in maintenance mode with minimal ongoing development.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/apis/rest-api-v2/get-started/introduction-new-relic-rest-api-v2/
  baseURL: https://api.newrelic.com/v2/
