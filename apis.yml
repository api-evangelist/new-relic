  tags:
  - NRQL
  - Lookups
  - Data Enrichment
  - REST
- aid: new-relic:new-relic-security-data-api
  name: New Relic Security Data API
  description: >-
    The New Relic Security Data API allows vulnerability and security finding data
    to be sent directly to New Relic via HTTP POST. It accepts JSON payloads
    describing detected vulnerabilities or security events, enabling integration
    with third-party vulnerability assessment tools and custom security scanning
    solutions for use with New Relic Security RX.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/data-apis/ingest-apis/security-data-api/
