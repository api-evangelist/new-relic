  - aid: new-relic:new-relic-alerts-api
    name: New Relic Alerts API
    description: The New Relic Alerts REST API provides endpoints for programmatically managing alert
      policies, conditions, notification channels, and muting rules. New Relic recommends using NerdGraph
      for new alert management integrations, as the REST Alerts API is in maintenance mode.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
    humanURL: https://docs.newrelic.com/docs/alerts/scale-automate/rest-api/rest-api-calls-alerts/
