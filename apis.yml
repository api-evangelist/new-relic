  tags:
  - Browser
  - JavaScript
  - Real User Monitoring
  - Monitoring
- aid: new-relic:new-relic-partnership-api
  name: New Relic Partnership API
  description: >-
    The New Relic Partnership API is a web service API for New Relic partners that
    enables them to create, edit, upgrade, downgrade, and cancel New Relic accounts
    on behalf of their customers. It is available only to New Relic partner accounts
    with partnership-level access.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/new-relic-partnerships/partner-integration-guide/partner-account-maintenance/partner-api/
