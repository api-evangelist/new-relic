  - aid: new-relic:new-relic-browser-api
    name: New Relic Browser API
    description: The New Relic Browser API provides JavaScript methods for extending and customizing browser
      monitoring data collection within the New Relic browser agent. Developers can use it to add custom
      attributes, record custom events, track page actions, and control agent behavior programmatically.
    image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
    humanURL: https://docs.newrelic.com/docs/browser/new-relic-browser/browser-apis/using-browser-apis/
