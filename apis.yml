  tags:
  - SDKs
  - Telemetry
  - Open Source
  - Client Libraries
- aid: new-relic:new-relic-opentelemetry-otlp
  name: New Relic OpenTelemetry OTLP Endpoint
  description: >-
    New Relic provides a native OTLP (OpenTelemetry Protocol) endpoint that accepts
    metrics, traces, and logs from any OpenTelemetry-instrumented application or
    OTLP exporter. It supports both gRPC and HTTP/protobuf transport and is the
    recommended integration path for OpenTelemetry users.
  image: https://newrelic.com/themes/custom/erno/assets/mediakit/new_relic_logo_horizontal.png
  humanURL: https://docs.newrelic.com/docs/opentelemetry/best-practices/opentelemetry-otlp/
