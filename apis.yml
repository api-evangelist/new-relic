  - type: UseCases
    name: New Relic Use Cases
    data:
      - name: Full-Stack Observability
        description: Gain unified visibility across applications, infrastructure, and digital experiences
          to quickly identify and resolve issues.
      - name: Cloud Migration Monitoring
        description: Monitor and validate cloud migration progress with baseline comparisons and performance
          tracking across hybrid environments.
      - name: DevOps and CI/CD Integration
        description: Integrate observability into development workflows with deployment markers, error
          tracking, and automated testing.
      - name: Site Reliability Engineering
        description: Define and track SLOs, manage error budgets, and implement reliability practices
          with data-driven insights.
      - name: Incident Response and Management
        description: Detect, diagnose, and resolve incidents faster with correlated telemetry, anomaly
          detection, and automated workflows.
      - name: Digital Experience Monitoring
        description: Measure and optimize end-user experience across web, mobile, and synthetic channels.
      - name: Capacity Planning
        description: Analyze resource utilization trends and forecast capacity needs to optimize infrastructure
          spending.
      - name: Compliance and Audit
        description: Maintain audit trails, security compliance, and data governance across observability
          data.
  - type: Integrations
    name: New Relic Integrations
    url: https://newrelic.com/instant-observability
    data:
      - name: Amazon Web Services
        description: Monitor AWS services including EC2, Lambda, RDS, S3, ECS, EKS, and CloudWatch with
          native integration.
      - name: Microsoft Azure
        description: Monitor Azure services including VMs, App Service, Functions, AKS, and Azure Monitor
          with native integration.
      - name: Google Cloud Platform
        description: Monitor GCP services including Compute Engine, Cloud Functions, GKE, BigQuery, and
          Cloud Monitoring.
      - name: Kubernetes
        description: Monitor Kubernetes clusters with automatic discovery, Pixie integration, and OpenTelemetry
          support.
      - name: Prometheus
        description: Ingest Prometheus metrics using remote write or the Prometheus OpenMetrics integration.
      - name: OpenTelemetry
        description: Native OTLP endpoint support for ingesting metrics, traces, and logs from OpenTelemetry-instrumented
          applications.
      - name: Terraform
        description: Provision and manage New Relic resources as code using the official Terraform provider.
      - name: Grafana
        description: Query New Relic data from Grafana dashboards using the Grafana data source plugin.
      - name: PagerDuty
        description: Send alert notifications to PagerDuty for incident management and on-call escalation.
      - name: Slack
        description: Receive alert notifications and share observability insights directly in Slack channels.
      - name: Jira
        description: Create Jira issues from New Relic errors and alerts for issue tracking and resolution
          workflows.
      - name: ServiceNow
        description: Integrate with ServiceNow for ITSM workflows, incident creation, and change management.
      - name: GitHub
        description: Connect repositories for code-level visibility, error linking, and deployment tracking
          via CodeStream.
      - name: Docker
        description: Monitor Docker containers with automatic instrumentation and container-level metrics.
      - name: Apache Kafka
        description: Monitor Kafka clusters, topics, consumer groups, and message throughput.
      - name: MySQL
        description: Monitor MySQL database performance with query analysis, connection tracking, and
          replication metrics.
      - name: PostgreSQL
        description: Monitor PostgreSQL database performance with query analysis, index usage, and connection
          metrics.
      - name: MongoDB
        description: Monitor MongoDB instances with query performance, replication status, and cluster
          metrics.
      - name: Redis
        description: Monitor Redis instances with memory usage, command statistics, and key metrics.
      - name: Nginx
        description: Monitor Nginx web server performance with request rates, error rates, and upstream
          metrics.
